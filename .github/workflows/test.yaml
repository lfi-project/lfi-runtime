on: [push, pull_request]
name: Build
jobs:
  test:
    strategy:
      matrix:
        go-version: ['1.22']
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu clang lld meson ninja-build

    - name: Install LFI x86-64 Compiler
      if: matrix.os == 'ubuntu-24.04'
      run: wget -q https://github.com/lfi-project/lfi/releases/download/v0.12/x86_64-lfi-clang.tar.gz && tar -xf x86_64-lfi-clang.tar.gz && echo "$PWD/x86_64-lfi-clang/lfi-bin" >> $GITHUB_PATH

    - name: Install LFI AArch64 Compiler
      if: matrix.os == 'ubuntu-24.04-arm'
      run: wget -q https://github.com/lfi-project/lfi/releases/download/v0.12/aarch64-lfi-clang.tar.gz && tar -xf aarch64-lfi-clang.tar.gz && echo "$PWD/aarch64-lfi-clang/lfi-bin" >> $GITHUB_PATH

    - name: Set env
      run: echo "ASAN_OPTIONS=use_sigaltstack=0" >> $GITHUB_ENV

    - name: Build & Test (gcc, asan+ubsan)
      run: |
        meson setup build-san -Db_sanitize=address,undefined -Dbuildtype=debugoptimized
        ninja -C build-san test

    - name: Build & Test (gcc, tsan)
      run: |
        meson setup build-tsan -Db_sanitize=thread -Dbuildtype=debugoptimized
        ninja -C build-tsan test

    - name: Build & Test (clang, asan+ubsan)
      env:
        CC: clang
        CXX: clang++
      run: |
        meson setup build-clang -Dbuildtype=debugoptimized
        ninja -C build-clang test

    - name: Build & Test (sys_minimal, asan+ubsan)
      run: |
        meson setup build-min -Db_sanitize=address,undefined -Dsys_minimal=true -Dbuildtype=debugoptimized
        ninja -C build-min test
